# Throwaway Postgres for the concurrency test suite.
# Start:  docker compose -f docker-compose.test.yml up -d
# Stop:   docker compose -f docker-compose.test.yml down
#
# Runs on port 5433 to avoid clashing with any local Postgres on 5432.
# Uses tmpfs (no named volume) so the data is wiped on every restart.
services:
  test-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_test"]
      interval: 2s
      timeout: 3s
      retries: 15
